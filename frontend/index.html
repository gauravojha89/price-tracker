<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Track product prices and get notified when they go on sale" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https://*.azure.com https://*.microsoft.com https://*.microsoftonline.com; font-src 'self' data:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>PriceWatch - Smart Price Tracking</title>
  </head>
  <body>
    <div id="auth-loading" style="display:none;position:fixed;inset:0;background:#f8fafc;z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
      <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin 1s linear infinite;"></div>
      <p style="color:#64748b;font-family:system-ui,sans-serif;">Redirecting to Microsoft...</p>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script>
      if(sessionStorage.getItem('auth_redirect')){
        document.getElementById('auth-loading').style.display='flex';
        sessionStorage.removeItem('auth_redirect');
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
